name: Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy-proves:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Configure git symlinks
        run: git config --global core.symlinks false

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy to Proves
        env:
          SFTP_PASSWORD: ${{ secrets.PROVES_SFTP_PASSWORD }}
        run: |
          chmod +x .github/scripts/sftp-deploy.sh
          .github/scripts/sftp-deploy.sh \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            "/aixada_proves" \
            "lavinag_aixprov" \
            "web-12.pangea.org" \
            "$SFTP_PASSWORD"

  deploy-prd:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Configure git symlinks
        run: git config --global core.symlinks false

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy to PRD
        env:
          SFTP_PASSWORD: ${{ secrets.PRD_SFTP_PASSWORD }}
        run: |
          chmod +x .github/scripts/sftp-deploy.sh
          .github/scripts/sftp-deploy.sh \
            "${{ github.event.before }}" \
            "${{ github.sha }}" \
            "/lavinagreta-aixada" \
            "vinagreta-aixada" \
            "web-12.pangea.org" \
            "$SFTP_PASSWORD"
